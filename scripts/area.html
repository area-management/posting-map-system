<!-- Next-Gen Area List Component -->
<div class="animate-fade-in">
  <div class="bg-white/60 dark:bg-white/5 m-8 rounded-[2.5rem] p-10 shadow-neu-light dark:shadow-neu-dark border border-white/10">
    <div class="flex justify-between items-center mb-8">
      <span class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-[0.2em]">Global Achievement</span>
      <strong id="area-progress-pct" class="text-3xl font-black text-navy dark:text-blue-400 tracking-tighter">0%</strong>
    </div>
    <div class="h-3 bg-apple-light dark:bg-apple-dark rounded-full shadow-neu-inset-light dark:shadow-neu-inset-dark overflow-hidden mb-6">
      <div id="area-bar" class="h-full bg-navy dark:bg-blue-600 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(26,35,126,0.3)]" style="width:0%"></div>
    </div>
    <div class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-widest flex justify-between">
      <span>Operational Coverage</span>
      <span><span id="area-done" class="text-navy dark:text-blue-400">0</span> / <span id="area-total">0</span> Units</span>
    </div>
  </div>

  <div class="px-8 mb-10">
    <div class="relative group">
      <input type="text" id="area-search" placeholder="エリアを検索..." oninput="filterAreas()" 
             class="w-full bg-apple-light/50 dark:bg-black/20 border-none rounded-[2rem] p-6 pl-16 text-lg font-bold shadow-neu-inset-light dark:shadow-neu-inset-dark outline-none focus:ring-4 ring-navy/5 dark:ring-blue-500/10 transition-all placeholder:text-gray-300">
      <span class="absolute left-7 top-1/2 -translate-y-1/2 text-2xl opacity-30 group-focus-within:opacity-100 transition-opacity">🔍</span>
    </div>
  </div>

  <div class="px-8 pb-48 space-y-6" id="area-list">
    <!-- Area items will be dynamically injected here with the new Hybrid UI style -->
  </div>
</div>
