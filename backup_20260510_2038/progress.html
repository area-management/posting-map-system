<style>
  .kpi-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: #fff; padding: 16px; border-radius: 16px; text-align: center; }
  .kpi-val { font-size: 20px; font-weight: 900; color: var(--navy); margin-bottom: 4px; }
  .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); }

  .progress-section { background: var(--navy); color: #fff; padding: 24px; border-radius: 20px; margin-bottom: 24px; }
  .progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
  .progress-pct { font-size: 32px; font-weight: 900; line-height: 1; }
  .progress-count { font-size: 13px; font-weight: 500; opacity: 0.8; }
  .progress-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--cyan); width: 0%; transition: width 1s ease-out; }

  .rank-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: #fff; border-radius: 12px; margin-bottom: 8px;
  }
  .rank-num {
    width: 28px; height: 28px; border-radius: 50%; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: var(--muted);
  }
  .rank-num.gold { background: #FFD700; color: #fff; }
  .rank-num.silver { background: #C0C0C0; color: #fff; }
  .rank-num.bronze { background: #CD7F32; color: #fff; }
  .rank-name { flex: 1; font-size: 14px; font-weight: 700; }
  .rank-count { font-size: 14px; font-weight: 900; color: var(--blue); }
  .rank-count span { font-size: 10px; font-weight: 500; color: var(--muted); margin-left: 2px; }
</style>

<div id="page-progress" class="page">
  <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 20px;">配布進捗</h2>

  <div class="progress-section">
    <div class="progress-header">
      <div class="progress-pct" id="progress-pct-main">0%</div>
      <div class="progress-count"><span id="area-done">0</span> / <span id="area-total">0</span> 軒</div>
    </div>
    <div class="progress-bar-bg">
      <div id="progress-bar-fill" class="progress-bar-fill"></div>
    </div>
  </div>

  <div class="kpi-container">
    <div class="kpi-card">
      <div class="kpi-val" id="kpi-sheets">0</div>
      <div class="kpi-label">エリア数</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val" id="kpi-staff">0</div>
      <div class="kpi-label">参加スタッフ</div>
    </div>
  </div>

  <h3 class="section-title">スタッフランキング</h3>
  <div id="ranking-list">
    <!-- 動的に生成されます -->
  </div>
</div>
