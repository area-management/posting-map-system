<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>COMMAND CENTER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              DEFAULT: '#1a237e',
              light: '#283593',
              dark: '#0d1642'
            },
            apple: '#f5f5f7'
          },
          fontFamily: {
            sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-custom { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="bg-apple text-[#1d1d1f] font-sans antialiased overflow-hidden select-none">

  <!-- PIN Authentication Screen -->
  <div id="screen-login" class="fixed inset-0 z-[2000] bg-white flex flex-col items-center justify-center p-8 text-center transition-all duration-500">
    <div class="w-32 h-32 bg-white rounded-[2.5rem] shadow-2xl shadow-navy/10 flex items-center justify-center overflow-hidden mb-12 ring-1 ring-black/[0.02]">
      <img src="https://area-management.github.io/posting-map-system/assets/icon-manager-180.png?v=72" class="w-full h-full object-cover">
    </div>
    <h1 class="text-2xl font-black tracking-tight text-navy mb-2 uppercase">Command Center</h1>
    <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-10">Administrator Login</p>
    
    <div class="flex gap-4 mb-10">
      <input type="password" maxlength="1" class="pin-input w-14 h-20 text-center text-3xl font-black bg-apple border-2 border-transparent focus:border-navy focus:bg-white rounded-2xl outline-none transition-all">
      <input type="password" maxlength="1" class="pin-input w-14 h-20 text-center text-3xl font-black bg-apple border-2 border-transparent focus:border-navy focus:bg-white rounded-2xl outline-none transition-all">
      <input type="password" maxlength="1" class="pin-input w-14 h-20 text-center text-3xl font-black bg-apple border-2 border-transparent focus:border-navy focus:bg-white rounded-2xl outline-none transition-all">
      <input type="password" maxlength="1" class="pin-input w-14 h-20 text-center text-3xl font-black bg-apple border-2 border-transparent focus:border-navy focus:bg-white rounded-2xl outline-none transition-all">
    </div>
    <p id="login-msg" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Enter Management PIN</p>
  </div>

  <!-- Loading Overlay -->
  <div id="screen-loading" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[3000] hidden flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-gray-100 border-t-navy rounded-full animate-spin-custom"></div>
    <p class="mt-6 text-navy font-black tracking-tight uppercase text-xs tracking-widest">Analyzing Data...</p>
  </div>

  <!-- Main Dashboard App -->
  <div id="app" class="hidden flex flex-col h-screen">
    <header class="bg-white/80 backdrop-blur-xl border-b border-gray-100 safe-top z-50">
      <div class="px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-navy rounded-xl flex items-center justify-center text-xl shadow-lg shadow-navy/20">📢</div>
          <div class="flex flex-col">
            <h1 id="branch-name" class="text-base font-black tracking-tight text-navy leading-none">COMMAND CENTER</h1>
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mt-1">Real-time Strategy Analysis</p>
          </div>
        </div>
        <button onclick="location.reload()" class="w-10 h-10 bg-apple rounded-full flex items-center justify-center active:scale-90 transition-transform">
          <span class="text-lg leading-none">🔄</span>
        </button>
      </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto hide-scrollbar p-6 space-y-6 safe-bottom">
      
      <!-- Progress Analytics -->
      <div class="bg-navy rounded-[2rem] p-8 text-white flex items-center gap-8 shadow-2xl shadow-navy/30 relative overflow-hidden ring-1 ring-white/10">
        <div class="relative w-28 h-28 flex-shrink-0">
          <svg class="transform -rotate-90 w-28 h-28" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="44" fill="transparent" stroke="white" stroke-opacity="0.1" stroke-width="10" />
            <circle id="ring-fill" cx="50" cy="50" r="44" fill="transparent" stroke="white" stroke-width="10" stroke-dasharray="276.5" stroke-dashoffset="276.5" stroke-linecap="round" class="transition-all duration-1000" />
          </svg>
          <div id="main-pct" class="absolute inset-0 flex items-center justify-center text-2xl font-black tracking-tighter">0%</div>
        </div>
        <div class="z-10">
          <h2 class="text-xl font-black tracking-tight leading-tight mb-2">配布状況<br>分析レポート</h2>
          <p class="text-[10px] font-bold text-white/50 uppercase tracking-widest">Global Field Status</p>
        </div>
        <!-- Decorative Glow -->
        <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-500 rounded-full blur-[80px] opacity-20"></div>
      </div>

      <!-- KPI Grid -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm ring-1 ring-black/[0.02]">
          <div class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 italic">Units Total</div>
          <div id="kpi-total-units" class="text-3xl font-black text-navy tracking-tighter">0</div>
        </div>
        <div class="bg-white rounded-[2rem] p-6 shadow-sm ring-1 ring-black/[0.02]">
          <div class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 italic">Done Units</div>
          <div id="kpi-done-units" class="text-3xl font-black text-green-500 tracking-tighter">0</div>
        </div>
        <div class="bg-white rounded-[2rem] p-6 shadow-sm ring-1 ring-black/[0.02] col-span-2 flex items-center justify-between">
          <div>
            <div class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1 italic">Total Volume</div>
            <div id="kpi-total-volume" class="text-3xl font-black text-blue-500 tracking-tighter leading-none">0</div>
          </div>
          <div class="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full uppercase tracking-widest">Cumulative</div>
        </div>
      </div>

      <!-- Ranking Section -->
      <section class="bg-white rounded-[2.5rem] p-8 shadow-sm ring-1 ring-black/[0.02]">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-base font-black text-navy tracking-tight">👑 配布ランキング</h3>
          <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Staff Performance</span>
        </div>
        <div id="ranking-list" class="space-y-4">
          <!-- Ranking entries -->
        </div>
      </section>

      <!-- Area Section -->
      <section class="bg-white rounded-[2.5rem] p-8 shadow-sm ring-1 ring-black/[0.02]">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-base font-black text-navy tracking-tight">📍 エリア別進捗</h3>
          <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Regional Progress</span>
        </div>
        <div id="area-list" class="space-y-2">
          <!-- Area entries -->
        </div>
      </section>

    </main>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzvQRNtJZ_Bk1A9IGDr7itqqqnZo9bLDTspIZNOX01SBxB-bak6ul6rROzgzvevWSNdNA/exec';
    const CORRECT_PIN = '2026';
    let pinEntered = "";

    const pinInputs = document.querySelectorAll('.pin-input');
    pinInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value) {
          pinEntered += e.target.value;
          if (index < 3) {
            pinInputs[index + 1].focus();
          } else {
            checkPin();
          }
        }
      });
      // Backspace handling
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          pinInputs[index - 1].focus();
          pinEntered = pinEntered.slice(0, -1);
        }
      });
    });

    function checkPin() {
      if (pinEntered === CORRECT_PIN) {
        const loginScreen = document.getElementById('screen-login');
        loginScreen.classList.add('opacity-0', 'pointer-events-none');
        setTimeout(() => loginScreen.classList.add('hidden'), 500);
        document.getElementById('app').classList.remove('hidden');
        loadDashboard();
      } else {
        const msg = document.getElementById('login-msg');
        msg.textContent = "INVALID PIN";
        msg.className = "text-xs font-black text-red-500 uppercase tracking-widest animate-bounce";
        pinEntered = "";
        pinInputs.forEach(i => i.value = "");
        pinInputs[0].focus();
        setTimeout(() => {
          msg.textContent = "Enter Management PIN";
          msg.className = "text-xs font-bold text-gray-400 uppercase tracking-widest";
        }, 2000);
      }
    }

    async function loadDashboard() {
      document.getElementById('screen-loading').classList.remove('hidden');
      try {
        const res = await fetch(`${API_URL}?action=getAppData`);
        const data = await res.json();
        renderDashboard(data);
      } catch (e) {
        alert("データの取得に失敗しました");
      }
      document.getElementById('screen-loading').classList.add('hidden');
    }

    function renderDashboard(data) {
      if (!data) return;

      document.getElementById('branch-name').textContent = (data.branchName || "BRANCH") + " COMMAND CENTER";
      
      const pct = Math.round((data.totalDistributed / data.targetGoal) * 100) || 0;
      document.getElementById('main-pct').textContent = pct + "%";
      
      // Ring circumference is 2 * PI * 44 = 276.46
      const offset = 276.5 - (276.5 * pct / 100);
      document.getElementById('ring-fill').style.strokeDashoffset = offset;

      document.getElementById('kpi-total-units').textContent = 651; // Config 준거
      document.getElementById('kpi-done-units').textContent = data.areas.filter(a => a.progress >= 100).length;
      document.getElementById('kpi-total-volume').textContent = data.totalDistributed.toLocaleString();

      // Ranking
      const rankHtml = (data.staffRanking || []).slice(0, 5).map((r, i) => `
        <div class="flex items-center gap-4 py-2">
          <div class="w-8 h-8 rounded-full bg-apple flex items-center justify-center text-xs font-black text-navy">${i+1}</div>
          <div class="flex-1">
            <div class="text-sm font-black text-navy">${r.name}</div>
            <div class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Field Specialist</div>
          </div>
          <div class="text-right">
            <div class="text-sm font-black text-green-500">${r.count.toLocaleString()}</div>
            <div class="text-[9px] font-bold text-gray-300 uppercase tracking-widest italic">Units</div>
          </div>
        </div>
      `).join('');
      document.getElementById('ranking-list').innerHTML = rankHtml || "<p class='text-center text-gray-300 font-bold py-4'>No Activity Detected</p>";

      // Area List
      const areaHtml = data.areas.slice(0, 15).map(a => `
        <div class="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
          <span class="text-xs font-black text-navy tracking-tight">${a.name}</span>
          <span class="text-[10px] font-black px-2 py-0.5 rounded-full ${a.progress >= 100 ? 'bg-green-100 text-green-700' : 'bg-apple text-gray-400'}">
            ${a.progress}%
          </span>
        </div>
      `).join('');
      document.getElementById('area-list').innerHTML = areaHtml;
    }

    window.onload = () => { pinInputs[0].focus(); };
  </script>
</body>
</html>
