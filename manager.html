<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ADMIN DASHBOARD v2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="apple-touch-icon" href="https://area-management.github.io/posting-map-system/assets/icon-admin-panel-180.png?v=101">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1a237e', light: '#283593', dark: '#0d1642' },
            apple: { light: '#f5f5f7', dark: '#000000' }
          },
          fontFamily: { sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .page { display: block; opacity: 1; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
    .page.hidden { display: none; opacity: 0; }
    .neu-flat { @apply bg-white dark:bg-[#1c1c1e] shadow-[8px_8px_20px_rgba(0,0,0,0.05)] dark:shadow-[8px_8px_20px_rgba(0,0,0,0.4)]; }
    .neu-inset { @apply bg-gray-50 dark:bg-black/20 shadow-[inset_4px_4px_10px_rgba(0,0,0,0.05)] dark:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.5)]; }
    .btn-neu { @apply transition-all duration-300 active:scale-95; }
  </style>
</head>
<body class="bg-apple-light dark:bg-apple-dark text-[#1d1d1f] dark:text-[#f5f5f7] font-sans antialiased overflow-hidden select-none transition-colors duration-500">

  <!-- 1. GATEWAY / SPLASH (MANAGER VERSION) -->
  <div id="screen-gateway" class="fixed inset-0 z-[1000] bg-apple-light dark:bg-apple-dark flex flex-col items-center justify-center p-10 text-center">
    <div class="flex flex-col items-center justify-center mb-6 mt-0">
      <div class="w-44 h-44 bg-apple-light dark:bg-[#1c1c1e] rounded-[3.8rem] shadow-neu-light dark:shadow-neu-dark flex items-center justify-center overflow-hidden mb-6 p-1 relative">
        <img src="https://area-management.github.io/posting-map-system/assets/icon-admin-panel-180.png?v=101" class="w-full h-full object-cover rounded-[3.5rem] z-10">
      </div>
      <p class="text-gray-500 dark:text-gray-400 leading-relaxed text-sm">
        <span class="font-black">管理者専用の管理画面です</span><br>
        <span class="font-medium">ホーム画面に追加してご利用ください</span>
      </p>
    </div>
    <div class="w-full max-w-sm space-y-4">
      <div class="bg-white/40 dark:bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-8 shadow-neu-light dark:shadow-neu-dark border border-white/20">
        <button onclick="startAdmin()" class="btn-neu w-full bg-navy dark:bg-blue-600 text-white rounded-2xl py-6 text-lg font-black shadow-xl uppercase tracking-tighter">管理画面を起動する</button>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-[0.4em] pt-4">Administrator Mode</p>
    </div>
  </div>

  <!-- 2. LOADING -->
  <div id="loading" class="fixed inset-0 z-[5000] flex flex-col items-center justify-center bg-apple-light dark:bg-apple-dark transition-opacity duration-700 hidden">
    <div class="w-12 h-12 border-[3px] border-navy/10 dark:border-white/10 border-t-navy dark:border-t-white rounded-full animate-spin"></div>
    <p class="mt-6 text-[10px] font-black text-navy/40 dark:text-white/40 uppercase tracking-[0.3em] animate-pulse">Syncing Admin Data...</p>
  </div>

  <!-- 3. MAIN ADMIN APP -->
  <div id="app" class="fixed inset-0 z-[2000] flex flex-col bg-apple-light dark:bg-apple-dark opacity-0 transition-opacity duration-1000 hidden">
    <header class="safe-top px-10 py-12 flex justify-between items-center">
      <h1 class="text-3xl font-black tracking-tighter text-navy dark:text-white leading-none">ADMIN DASHBOARD</h1>
      <button onclick="location.reload()" class="w-12 h-12 neu-flat rounded-2xl flex items-center justify-center text-xl">🔄</button>
    </header>

    <main id="content" class="flex-1 overflow-y-auto hide-scrollbar px-10 space-y-12 pb-48">
      <div class="neu-flat rounded-[3rem] p-12 text-center shadow-2xl">
        <h2 class="text-3xl font-black text-navy dark:text-white leading-tight mb-6">管理機能準備中</h2>
        <p class="text-gray-400 font-bold text-sm">API連携による戦略ダッシュボードを<br>順次展開します。</p>
      </div>
    </main>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const API_URL = "https://script.google.com/macros/s/AKfycbyFoJ2Tp7F4MOZ3lNyVDLTl45fVlV-hyAC1uYGL42oXkjBJ3ylST3KUYpaTb0lpK9FmSA/exec";

    function startAdmin() {
      $('screen-gateway').classList.add('hidden');
      $('loading').classList.remove('hidden');
      
      // Simulate data fetch
      setTimeout(() => {
        $('app').classList.remove('hidden');
        setTimeout(() => {
          $('app').classList.remove('opacity-0');
          $('loading').classList.add('opacity-0');
          setTimeout(() => $('loading').classList.add('hidden'), 700);
        }, 500);
      }, 1000);
    }
  </script>
</body>
</html>
