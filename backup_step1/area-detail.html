<style>
  .detail-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .back-btn {
    width: 40px; height: 40px; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: none; font-size: 20px;
  }
  .detail-card {
    border-left: 5px solid var(--border); transition: border-color 0.3s ease;
    padding: 16px !important;
  }
  .detail-card:has(input:checked) { border-left-color: var(--green); }
  
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
  .detail-address-box { flex: 1; }
  .detail-address { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
  .detail-memo { font-size: 12px; color: var(--muted); font-weight: 500; }
  
  .map-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    background: var(--bg); color: var(--blue); padding: 8px 12px; border-radius: 8px;
    text-decoration: none; font-size: 13px; font-weight: 700; border: 1px solid var(--border);
    white-space: nowrap;
  }
  
  .detail-controls { display: flex; flex-direction: column; gap: 16px; }
  
  .detail-check { display: flex; align-items: center; gap: 10px; }
  .detail-check input[type="checkbox"] {
    width: 24px; height: 24px; accent-color: var(--green);
  }
  .detail-check label { font-size: 14px; font-weight: 700; }

  .detail-inputs { display: flex; gap: 8px; }
  .detail-inputs select {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); font-size: 13px; font-weight: 700; color: var(--text);
    -webkit-appearance: none; appearance: none;
  }
</style>

<div id="page-area-detail" class="page">
  <div class="detail-header">
    <button class="back-btn" onclick="switchPage('area')">‹</button>
    <h2 id="detail-title" style="font-size: 18px; font-weight: 900;">エリア詳細</h2>
  </div>

  <div id="detail-list">
    <!-- 動的に生成されます -->
  </div>
</div>
