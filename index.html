<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POSTING MAP PRO v2.0-API</title>
  <!-- Cache Buster: v78 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="apple-touch-icon" href="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=100">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1a237e', light: '#283593', dark: '#0d1642' },
            apple: { light: '#f5f5f7', dark: '#000000' }
          },
          fontFamily: { sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .page { display: block; opacity: 1; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
    .page.hidden { display: none; opacity: 0; }
    .neu-flat { @apply bg-white dark:bg-[#1c1c1e] shadow-[8px_8px_20px_rgba(0,0,0,0.05)] dark:shadow-[8px_8px_20px_rgba(0,0,0,0.4)]; }
    .neu-inset { @apply bg-gray-50 dark:bg-black/20 shadow-[inset_4px_4px_10px_rgba(0,0,0,0.05)] dark:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.5)]; }
    .btn-neu { @apply transition-all duration-300 active:scale-95; }
  </style>
</head>
<body class="bg-apple-light dark:bg-apple-dark text-[#1d1d1f] dark:text-[#f5f5f7] font-sans antialiased overflow-hidden select-none transition-colors duration-500">

  <!-- 1. GATEWAY / SPLASH -->
  <div id="screen-gateway" class="fixed inset-0 z-[1000] bg-apple-light dark:bg-apple-dark flex flex-col items-center justify-center p-10 text-center">
    <div class="flex flex-col items-center justify-center mb-6 mt-0">
      <div class="w-44 h-44 bg-apple-light dark:bg-[#1c1c1e] rounded-[3.8rem] shadow-neu-light dark:shadow-neu-dark flex items-center justify-center overflow-hidden mb-6 p-1 relative">
        <img src="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=100" class="w-full h-full object-cover rounded-[3.5rem] z-10">
      </div>
      <p class="text-gray-500 dark:text-gray-400 font-bold leading-relaxed text-sm">ホーム画面へ追加してから<br>アプリをご利用ください</p>
    </div>
    <div class="w-full max-w-sm space-y-4">
      <div class="bg-white/40 dark:bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-8 shadow-neu-light dark:shadow-neu-dark border border-white/20">
        <button onclick="startApp()" class="btn-neu w-full bg-navy dark:bg-blue-600 text-white rounded-2xl py-6 text-xl font-black shadow-xl uppercase tracking-tighter">アプリを起動する</button>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-[0.4em] pt-4">Operational Environment</p>
    </div>
  </div>

  <!-- 2. LOADING -->
  <div id="loading" class="fixed inset-0 z-[5000] flex flex-col items-center justify-center bg-apple-light dark:bg-apple-dark transition-opacity duration-700 hidden">
    <div class="w-12 h-12 border-[3px] border-navy/10 dark:border-white/10 border-t-navy dark:border-t-white rounded-full animate-spin"></div>
    <p class="mt-6 text-[10px] font-black text-navy/40 dark:text-white/40 uppercase tracking-[0.3em] animate-pulse">Syncing Data...</p>
  </div>

  <!-- 3. MAIN APP -->
  <div id="app" class="fixed inset-0 z-[2000] flex flex-col bg-apple-light dark:bg-apple-dark opacity-0 transition-opacity duration-1000 hidden">
    <header class="safe-top px-8 py-8 flex justify-between items-center">
      <h1 class="text-2xl font-black tracking-tighter text-navy dark:text-white leading-none">POSTING MAP</h1>
      <div class="bg-white/60 dark:bg-white/10 px-4 py-2 rounded-full flex items-center gap-3 shadow-neu-inset-light dark:shadow-neu-inset-dark">
        <div id="sync-status" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
        <span id="header-pct" class="text-xs font-black text-navy dark:text-blue-400 tracking-tighter">0%</span>
      </div>
    </header>

    <main id="content" class="flex-1 overflow-y-auto hide-scrollbar px-6 space-y-10 pb-48">
      <!-- AREAS PAGE -->
      <section id="page-areas" class="page space-y-8">
        <div id="area-list" class="space-y-6"></div>
      </section>

      <!-- DETAIL PAGE -->
      <section id="page-detail" class="page hidden space-y-8">
        <div class="flex items-center gap-4 mb-4">
          <button onclick="switchPage('areas')" class="w-12 h-12 neu-flat rounded-2xl flex items-center justify-center text-xl">‹</button>
          <h2 id="detail-title" class="text-2xl font-black text-navy dark:text-white tracking-tighter truncate">Area Detail</h2>
        </div>
        <div id="detail-list" class="space-y-8 pb-20"></div>
      </section>

      <!-- AUTH/SETTINGS PAGE -->
      <section id="page-settings" class="page hidden space-y-8">
        <div class="neu-flat rounded-[2.5rem] p-10 text-center shadow-2xl">
          <h2 class="text-3xl font-black text-navy dark:text-white leading-tight mb-8">お名前を登録して<br>ください</h2>
          <div class="space-y-8 text-left">
            <div>
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-3 ml-2">苗字</label>
              <input type="text" id="user-last" class="neu-inset w-full rounded-2xl p-5 text-lg font-black text-navy dark:text-white outline-none" placeholder="例：鈴木">
            </div>
            <div>
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-3 ml-2">名前</label>
              <input type="text" id="user-first" class="neu-inset w-full rounded-2xl p-5 text-lg font-black text-navy dark:text-white outline-none" placeholder="例：一郎">
            </div>
            <button onclick="saveProfile()" class="btn-neu w-full bg-navy dark:bg-blue-600 text-white rounded-2xl py-5 text-lg font-black shadow-xl">登録を完了する</button>
          </div>
        </div>
      </section>
    </main>

    <!-- 下ナビ：90pxに調整 -->
    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[4000]">
      <div class="bg-white/60 dark:bg-black/60 backdrop-blur-3xl rounded-[2.5rem] p-2 shadow-neu-light dark:shadow-neu-dark border border-white/20 flex justify-around items-center h-[90px] relative">
        <button onclick="switchPage('areas')" class="nav-btn flex flex-col items-center gap-1 flex-1"><div class="text-xl">📍</div><span class="text-[9px] font-black uppercase tracking-widest">Areas</span></button>
        <button onclick="switchPage('settings')" class="nav-btn flex flex-col items-center gap-1 flex-1"><div class="text-xl">👤</div><span class="text-[9px] font-black uppercase tracking-widest">Auth</span></button>
      </div>
    </nav>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let allPoints = [], areaSummary = [], roster = [];
    
    // GAS API CONFIG (JSON ONLY)
    const API_URL = "https://script.google.com/macros/s/AKfycbyFoJ2Tp7F4MOZ3lNyVDLTl45fVlV-hyAC1uYGL42oXkjBJ3ylST3KUYpaTb0lpK9FmSA/exec";

    async function callApi(action, params = {}) {
      let url = API_URL + "?action=" + action;
      for (let key in params) {
        url += "&" + key + "=" + encodeURIComponent(params[key]);
      }
      
      try {
        const response = await fetch(url, {
          method: 'GET',
          mode: 'cors',
          credentials: 'omit',
          redirect: 'follow'
        });
        
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }
        
        const data = await response.json();
        if (data.success === false) {
          throw new Error(data.message || "API Error");
        }
        return data;
      } catch (err) {
        console.error("API Connection Error:", err);
        alert("通信エラーが発生しました。\n内容: " + err.message);
        throw err;
      }
    }

    function startApp() {
      $('screen-gateway').classList.add('hidden');
      $('loading').classList.remove('hidden');
      loadData();
    }

    async function loadData() {
      try {
        const data = await callApi('getAppData');
        if (data && data.success) {
          areaSummary = data.areas;
          renderAreas();
          updateStats();
          
          const saved = localStorage.getItem('user_info');
          switchPage(saved ? 'areas' : 'settings');
          
          $('app').classList.remove('hidden');
          setTimeout(() => {
            $('app').classList.remove('opacity-0');
            $('loading').classList.add('opacity-0');
            setTimeout(() => $('loading').classList.add('hidden'), 700);
          }, 500);
        } else {
          throw new Error(data ? data.message : "データが空です");
        }
      } catch (err) {
        console.error("Startup Error:", err);
        $('loading').classList.add('hidden');
        $('screen-gateway').classList.remove('hidden');
      }
    }

    function renderAreas() {
      if (!areaSummary || areaSummary.length === 0) {
        $('area-list').innerHTML = '<p class="text-center text-gray-400 py-20 font-bold">データがありません。<br>一括作成を実行してください。</p>';
        return;
      }
      $('area-list').innerHTML = areaSummary.map(s => `
        <div class="neu-flat rounded-[2rem] p-8 flex items-center active:scale-[0.98] transition-all" onclick="openDetail('${s.name}')">
          <div class="w-3 h-3 rounded-full mr-6 ${s.progress >= 100 ? 'bg-green-500 shadow-[0_0_15px_#22c55e]' : 'bg-rose-500'}"></div>
          <div class="flex-1">
            <div class="text-lg font-black text-navy dark:text-white tracking-tighter">${s.name}</div>
            <div class="text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${s.progress}% Completed</div>
          </div>
          <span class="text-gray-300 text-xl font-light">›</span>
        </div>`).join('');
    }

    async function openDetail(name) {
      $('loading').classList.remove('hidden');
      $('loading').classList.remove('opacity-0');
      
      try {
        const data = await callApi('getAreaDetails', { name: name });
        if (data && data.points) {
          $('detail-title').textContent = name;
          $('detail-list').innerHTML = data.points.map((p, i) => `
            <div class="neu-flat rounded-[2rem] p-8 space-y-6">
              <div class="flex justify-between items-start gap-4">
                <div class="text-lg font-black text-navy dark:text-white tracking-tight leading-tight">${p.address}</div>
                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.address)}" target="_blank" class="w-14 h-14 neu-flat rounded-2xl flex items-center justify-center text-xl">📍</a>
              </div>
              <div class="flex flex-col gap-6">
                <label class="neu-inset rounded-3xl p-5 flex items-center gap-5 cursor-pointer active:scale-[0.98] transition-all">
                  <input type="checkbox" class="w-8 h-8 rounded-xl accent-navy" ${p.isDone?'checked':''} onchange="updateRecord('${name}',${p.rowId},'done',this.checked)">
                  <span class="text-[10px] font-black uppercase tracking-widest text-navy dark:text-white">${p.isDone?'MISSION COMPLETED':'READY TO DEPLOY'}</span>
                </label>
              </div>
            </div>`).join('');
          switchPage('detail');
        }
      } catch (e) {
        alert("詳細データの取得に失敗しました。");
      }
      
      $('loading').classList.add('opacity-0');
      setTimeout(() => $('loading').classList.add('hidden'), 700);
    }

    async function updateRecord(areaName, rowId, field, val) {
      const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
      const staffName = `${userInfo.last || ''} ${userInfo.first || ''}`.trim();
      
      try {
        const result = await callApi('submitDistribution', {
          areaName: areaName,
          rowId: rowId,
          staffName: staffName,
          isDone: val,
          action: 'submitDistribution'
        });
        if (result.success) {
          loadData();
        }
      } catch (e) {
        alert("更新に失敗しました。");
      }
    }

    function switchPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      const target = $(id === 'detail' ? 'page-detail' : (id === 'settings' ? 'page-settings' : 'page-areas'));
      if(target) target.classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach((b, i) => { b.style.opacity = (id === 'areas' && i === 0) || (id === 'settings' && i === 1) ? '1' : '0.3'; });
      $('content').scrollTo(0,0);
    }

    function updateStats() {
      const total = areaSummary.length;
      if (total === 0) {
        $('header-pct').textContent = '0%';
        return;
      }
      const avg = areaSummary.reduce((acc, cur) => acc + (cur.progress || 0), 0) / total;
      $('header-pct').textContent = Math.round(avg) + '%';
    }

    function saveProfile() {
      const last = $('user-last').value.trim(), first = $('user-first').value.trim();
      if (!last || !first) { alert('姓名を入力してください'); return; }
      localStorage.setItem('user_info', JSON.stringify({last, first}));
      loadData();
    }

    window.onload = () => {
      console.log("POSTING MAP PRO initialized.");
    };
  </script>
</body>
</html>
