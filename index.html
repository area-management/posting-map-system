<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POSTING MAP</title>
  <link rel="apple-touch-icon" href="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a237e;
      --blue: #2196f3;
      --green: #4caf50;
      --orange: #ff9800;
      --red: #f44336;
      --gray: #666;
      --light-bg: #f8f9fa;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #ffffff; color: #333; overflow: hidden;
    }
    .hidden { display: none !important; }

    /* Gateway / Splash */
    #screen-gateway {
      height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; background: #fff; padding: 40px; text-align: center;
    }
    .btn-premium {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white; border: none; border-radius: 18px; padding: 20px 40px;
      font-size: 18px; font-weight: 800; box-shadow: 0 10px 25px rgba(217, 119, 6, 0.3);
      cursor: pointer; width: 100%; transition: transform 0.2s;
    }
    .btn-premium:active { transform: scale(0.96); }

    /* Main Shell */
    #app-shell { display: flex; flex-direction: column; height: 100vh; }
    header { 
      padding: env(safe-area-inset-top) 20px 10px;
      display: flex; justify-content: space-between; align-items: flex-end;
      background: transparent; z-index: 100;
    }
    .header-content { display: contents; }
    .logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; color: var(--navy); }
    .sync-badge { font-size: 11px; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 4px; }

    /* Navigation */
    .nav-bar {
      height: 70px; display: flex; background: white; border-top: 1px solid #f0f0f0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #ccc;
    }
    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 11px; font-weight: 700; margin-top: 4px; }

    /* Components */
    .view-container { flex: 1; overflow-y: auto; background: var(--light-bg); padding: 20px; }
    /* 登録カードの調整 */
    .setup-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      margin: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .setup-card h2 {
      font-size: 26px;
      color: #1a237e;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .setup-card p {
      font-size: 15px;
      color: #666;
      margin-bottom: 32px;
    }
    .input-group {
      margin-bottom: 24px;
    }
    .input-group label {
      display: block;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 10px;
      color: #333;
    }
    .input-group input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid #f0f0f0;
      background: #f8f9fa;
      font-size: 16px;
      transition: all 0.2s;
    }
    .input-group input:focus {
      border-color: #1a237e;
      background: white;
      outline: none;
    }
    
    /* 下部ナビゲーションの調整 */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid #eee;
    }
    .nav-item {
      text-align: center;
      color: #999;
      flex: 1;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-item.active { color: #1a237e; }
    .nav-item i {
      display: block;
      font-size: 26px;
      margin-bottom: 4px;
    }

    /* Loading Overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.9);
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
    }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--navy); color: white; padding: 12px 24px; border-radius: 50px;
      font-size: 14px; font-weight: 800; z-index: 11000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div id="screen-gateway" class="hidden">
  <div style="width:120px; height:120px; background:white; border-radius:32px; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 35px rgba(0,0,0,0.06); margin-bottom:40px; overflow:hidden;">
    <img src="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=73" style="width:100%; height:100%; object-fit:cover;">
  </div>
  <div style="margin-bottom:60px;">
    <p style="font-size:20px; font-weight:700; color:#666; line-height:1.7; text-align: center; white-space: nowrap;">
      ホーム画面に追加してから<br>ご利用ください
    </p>
  </div>
  <button class="btn-premium" onclick="forceStart()">アプリを起動する</button>
</div>

<div id="app-shell" class="hidden">
  <header>
    <div class="header-content">
      <div class="logo"><span style="color:var(--navy)">POSTING</span> <span style="color:var(--blue)">MAP</span></div>
      <div class="sync-badge" id="header-sync">
        <span style="margin-right:4px;">●</span> <span id="sync-pct">0%</span> SYNC
      </div>
    </div>
  </header>
  <div class="view-container" id="view-content"></div>
  <nav class="bottom-nav">
    <div class="nav-item" id="nav-howto" onclick="switchTab('howto')">
      <i>📖</i>
      <div>使いかた</div>
    </div>
    <div class="nav-item" id="nav-area" onclick="switchTab('area')">
      <i>🗺️</i>
      <div>エリア</div>
    </div>
    <div class="nav-item" id="nav-settings" onclick="switchTab('settings')">
      <i>⚙️</i>
      <div>設定</div>
    </div>
  </nav>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg" style="margin-top:15px; font-weight:800; color:var(--navy);">同期中...</p>
</div>
<div id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzvQRNtJZ_Bk1A9IGDr7itqqqnZo9bLDTspIZNOX01SBxB-bak6ul6rROzgzvevWSNdNA/exec';
  let appData = null;
  let currentUser = JSON.parse(localStorage.getItem('posting_user')) || null;
  let currentTab = 'settings';

  async function api(action, params = {}, method = 'GET') {
    const url = new URL(API_URL);
    url.searchParams.append('action', action);
    try {
      const options = { method: method, redirect: 'follow' };
      if (method === 'POST') {
        const formData = new FormData();
        formData.append('json', JSON.stringify({ action, ...params }));
        options.body = formData;
      } else {
        Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      }
      const response = await fetch(url, options);
      return await response.json();
    } catch (err) { return null; }
  }

  function init() {
    const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    if (!isStandalone) {
      document.getElementById('screen-gateway').classList.remove('hidden');
    } else {
      startApp();
    }
  }

  async function startApp() {
    document.getElementById('screen-gateway').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    
    // 1. まずローカルキャッシュがあれば即座に表示（爆速体験）
    const cached = localStorage.getItem('posting_app_cache');
    if (cached) {
      appData = JSON.parse(cached);
      renderView();
    }
    
    switchTab(currentUser ? 'area' : 'settings');
    
    // 2. 裏で最新データを取得
    if (!cached) showLoading('同期中...');
    try {
      const data = await api('getAppData');
      hideLoading();
      
      if (data) {
        appData = data;
        localStorage.setItem('posting_app_cache', JSON.stringify(data)); // キャッシュ更新
        const syncVal = currentUser ? '100%' : '0%';
        const badge = document.getElementById('sync-pct');
        if (badge) badge.textContent = syncVal;
        renderView();
      } else {
        throw new Error("Empty data");
      }
    } catch (e) {
      hideLoading();
      console.error("Sync failed:", e);
      if (!appData) showToast('通信エラー: 再試行してください', true);
      renderView();
    }
  }

  function forceStart() { startApp(); }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const target = document.getElementById('nav-' + tab);
    if (target) target.classList.add('active');
    renderView();
  }

  function renderView() {
    const main = document.getElementById('view-content');
    if (!main) return;
    main.innerHTML = '';
    
    if (currentTab === 'settings') {
      renderSettings();
    } else if (currentTab === 'area') {
      renderAreaList();
    } else if (currentTab === 'howto') {
      main.innerHTML = `
        <div class="view-title">使いかた</div>
        <div class="setup-card">
          <h2>準備中です</h2>
          <p>マニュアルコンテンツを現在作成しています。しばらくお待ちください。</p>
        </div>
      `;
    }
  }

  function renderSettings() {
    const main = document.getElementById('view-content');
    main.innerHTML = `
      <div class="view-title">設定・配布員登録</div>
      <div class="setup-card">
        <div class="status-badge" style="background:${currentUser?'#e8f5e9':'#fff3e0'}; color:${currentUser?'#2e7d32':'#ef6c00'};">
          ${currentUser ? '登録済み' : '未登録'}
        </div>
        <h2>お名前を登録してください</h2>
        <p>一度登録すると、自動的にあなたの名前で報告されます。</p>
        
        <div class="input-group">
          <label>苗字（全角）</label>
          <input type="text" id="reg-last" placeholder="例：鈴木" value="${currentUser ? currentUser.name.split(' ')[0] : ''}">
        </div>
        <div class="input-group">
          <label>名前（全角）</label>
          <input type="text" id="reg-first" placeholder="例：一郎" value="${currentUser ? currentUser.name.split(' ')[1] : ''}">
        </div>
        
        <button class="btn btn-primary" onclick="handleRegister()">
          ${currentUser ? '登録情報を更新する' : '登録を完了する'}
        </button>
      </div>
    `;
  }

  function renderAreaList() {
    const main = document.getElementById('view-content');
    if (!appData) {
      main.innerHTML = `<div class="setup-card" style="text-align:center;"><p>データを同期しています...</p><button onclick="startApp()" class="btn btn-primary">再試行する</button></div>`;
      return;
    }
    const list = appData.areas.map(a => `
        <div class="setup-card" style="display:flex; align-items:center; margin-bottom:15px;">
          <div style="width:12px; height:12px; border-radius:50%; background:${a.progress >= 100 ? 'var(--green)' : a.progress > 0 ? 'var(--orange)' : '#ddd'}; margin-right:18px;"></div>
          <div style="flex:1; font-weight:800; color:#333; font-size:17px;">${a.name}</div>
          <div style="font-size:14px; font-weight:900; color:#999;">${a.progress}%</div>
        </div>
      `).join('');
    main.innerHTML = `<div class="view-title">配布エリア一覧</div>${list}`;
  }

  async function handleRegister() {
    const last = document.getElementById('reg-last').value;
    const first = document.getElementById('reg-first').value;
    if (!last || !first) return showToast('苗字と名前を入力してください', true);
    showLoading('登録中...');
    const res = await api('registerStaff', { lastName: last, firstName: first }, 'POST');
    hideLoading();
    if (res && res.success) {
      currentUser = { id: res.id, name: res.name };
      localStorage.setItem('posting_user', JSON.stringify(currentUser));
      showToast('登録が完了しました');
      startApp();
    } else { showToast('登録に失敗しました', true); }
  }

  function showLoading(msg) { document.getElementById('loading-msg').textContent = msg; document.getElementById('loading-overlay').style.display = 'flex'; }
  function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
  function showToast(msg, isErr=false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.background = isErr ? 'var(--red)' : 'var(--navy)';
    t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000);
  }
  function logout() { if(confirm("登録を解除しますか？")){localStorage.removeItem('posting_user'); currentUser=null; startApp();} }
  init();
</script>
</body>
</html>
