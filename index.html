<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POSTING MAP PRO v2.0-API</title>
  <!-- Force Refresh: v200 (2026-05-15T09:14:40) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="apple-touch-icon" href="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=200">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1a237e', light: '#283593', dark: '#0d1642' },
            apple: { light: '#f5f5f7', dark: '#000000' }
          },
          fontFamily: { sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .page { display: block; opacity: 1; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
    .page.hidden { display: none; opacity: 0; }
    .neu-flat { @apply bg-white dark:bg-[#1c1c1e] shadow-[8px_8px_20px_rgba(0,0,0,0.05)] dark:shadow-[8px_8px_20px_rgba(0,0,0,0.4)]; }
    .neu-inset { @apply bg-gray-50 dark:bg-black/20 shadow-[inset_4px_4px_10px_rgba(0,0,0,0.05)] dark:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.5)]; }
    
    /* プレミアム・インタラクション・ヒエラルキー (0.14s ease) */
    button, .btn-neu, .nav-btn, .clickable-card {
      transition: all 0.14s ease !important;
    }
    
    /* PRIMARY (主操作: 起動・登録ボタン等) */
    .btn-neu:active, .pressed-primary {
      transform: scale(0.96);
      filter: brightness(1.08);
      box-shadow: none !important;
    }

    /* SECONDARY (補助操作: エリアカード等) */
    .clickable-card:active, .pressed-secondary {
      transform: scale(0.985);
      opacity: 0.96;
      box-shadow: none !important;
    }

    /* NAV BUTTON (ナビ操作: 背景変化のみ) */
    .nav-btn:active, .pressed-nav {
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
    }

    .description { line-height: 160%; }
    input::placeholder { text-align: center; }
  </style>
</head>
<body class="bg-[#000000] text-white font-sans antialiased overflow-hidden select-none transition-colors duration-500">

  <!-- 1. GATEWAY / SPLASH -->
  <div id="screen-gateway" class="fixed inset-0 z-[1000] bg-[#000000] flex flex-col items-center justify-center p-10 text-center">
    <div class="flex flex-col items-center justify-center mb-6 mt-0">
      <div class="w-44 h-44 bg-white/5 backdrop-blur-2xl rounded-[3.8rem] border border-white/10 flex items-center justify-center overflow-hidden mb-6 p-1 relative shadow-2xl">
        <img src="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=200" class="w-full h-full object-cover rounded-[3.5rem] z-10">
      </div>
      <div class="text-center">
        <h2 style="color: rgba(255,255,255,0.72);" class="text-base font-black leading-tight">ホーム画面へ追加してから</h2>
        <p style="color: rgba(255,255,255,0.4);" class="text-[11px] font-medium mt-2">アプリをご利用ください</p>
      </div>
    </div>
    <div class="w-full max-w-sm space-y-4">
      <div class="bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
        <button onclick="startApp()" class="btn-neu w-full bg-[#2563eb] text-white rounded-2xl py-6 text-lg font-black shadow-xl uppercase tracking-tighter">アプリを起動する</button>
      </div>
    </div>
  </div>

  <!-- 2. LOADING -->
  <div id="loading" class="fixed inset-0 z-[5000] flex flex-col items-center justify-center bg-[#000000] transition-opacity duration-700 hidden">
    <div class="w-12 h-12 border-[3px] border-white/10 border-t-[#2563eb] rounded-full animate-spin"></div>
    <p class="mt-6 text-[10px] font-black text-white/40 uppercase tracking-[0.3em] animate-pulse">Syncing Data...</p>
  </div>

  <!-- 3. MAIN APP -->
  <div id="app" class="fixed inset-0 z-[2000] flex flex-col bg-[#000000] opacity-0 transition-opacity duration-1000 hidden">
    <header class="safe-top px-8 py-8 flex justify-between items-center">
      <h1 class="text-2xl font-black tracking-tighter text-white leading-none">POSTING MAP</h1>
      <div class="bg-white/5 backdrop-blur-xl px-5 py-2 rounded-full flex items-center gap-3 border border-white/10">
        <div id="sync-status" class="w-2 h-2 bg-[#22c55e] rounded-full shadow-[0_0_8px_#22c55e]"></div>
        <span id="header-pct" class="text-xs font-black text-[#2563eb] tracking-tighter">0%</span>
      </div>
    </header>

    <main id="content" class="flex-1 overflow-y-auto hide-scrollbar px-6 space-y-10 pb-48">
      <!-- AREAS PAGE -->
      <section id="page-areas" class="page space-y-8">
        <div id="area-list" class="space-y-6"></div>
      </section>

      <!-- DETAIL PAGE -->
      <section id="page-detail" class="page hidden space-y-8">
        <div class="flex items-center gap-4 mb-4">
          <button onclick="switchPage('areas')" class="w-12 h-12 neu-flat rounded-2xl flex items-center justify-center text-xl">‹</button>
          <h2 id="detail-title" class="text-2xl font-black text-navy dark:text-white tracking-tighter truncate">Area Detail</h2>
        </div>
        <div id="detail-list" class="space-y-8 pb-20"></div>
      </section>

      <!-- AUTH/SETTINGS PAGE -->
      <section id="page-settings" class="page hidden space-y-8">
        <div id="settings-content" class="space-y-8">
          <!-- Dynamic Content (Card 1 or Card 2) -->
        </div>
      </section>
    </main>

    <!-- 下ナビ：90pxに調整 -->
    <nav id="bottom-nav" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[4000] hidden">
      <div class="bg-white/5 backdrop-blur-3xl rounded-[2.5rem] p-2 border border-white/10 flex justify-around items-center h-[90px] relative shadow-2xl">
        <button onclick="switchPage('areas')" class="nav-btn flex flex-col items-center gap-1 flex-1 transition-all"><div class="text-xl">📍</div><span class="text-[10px] font-black uppercase tracking-widest text-gray-500">地区</span></button>
        <button onclick="switchPage('settings')" class="nav-btn flex flex-col items-center gap-1 flex-1 transition-all"><div class="text-xl">👤</div><span class="text-[10px] font-black uppercase tracking-widest text-gray-500">設定</span></button>
      </div>
    </nav>
  </div>

  <div id="modal-container" class="fixed inset-0 z-[10000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-8 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-[#1c1c1e] w-full max-w-[320px] rounded-[2.5rem] p-10 border border-white/5 shadow-2xl transform scale-95 transition-transform duration-300" id="modal-box">
      <div class="flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-[#2563eb]/10 rounded-full flex items-center justify-center mb-8">
          <div class="w-8 h-8 rounded-full border-2 border-[#2563eb] flex items-center justify-center text-[#2563eb] font-black text-xl italic">i</div>
        </div>
        <h3 id="modal-title" class="text-xl font-black text-white tracking-tighter mb-3">姓名を入力してください</h3>
        <p id="modal-msg" class="text-xs font-medium text-gray-500 leading-relaxed mb-10 px-4">名前は必須項目です。</p>
        <button onclick="closeModal()" class="btn-neu w-full bg-[#2563eb] text-white py-5 rounded-[1.4rem] text-sm font-black shadow-lg shadow-blue-900/20">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let allPoints = [], areaSummary = [], roster = [];

    // プレミアム・インタラクション・スキル (JS Touch Handler)
    document.addEventListener('touchstart', e => {
      const el = e.target.closest('.btn-neu, .clickable-card, .nav-btn');
      if (!el) return;
      if (el.classList.contains('btn-neu')) el.classList.add('pressed-primary');
      if (el.classList.contains('clickable-card')) el.classList.add('pressed-secondary');
      if (el.classList.contains('nav-btn')) el.classList.add('pressed-nav');
    }, {passive: true});

    document.addEventListener('touchend', removePressed);
    document.addEventListener('touchcancel', removePressed);
    function removePressed() {
      document.querySelectorAll('.pressed-primary, .pressed-secondary, .pressed-nav').forEach(el => {
        el.classList.remove('pressed-primary', 'pressed-secondary', 'pressed-nav');
      });
    }

    // プレミアム・モーダル制御
    function showModal(title, msg) {
      $('modal-title').innerHTML = title;
      $('modal-msg').innerHTML = msg;
      const container = $('modal-container');
      const box = $('modal-box');
      container.classList.remove('opacity-0', 'pointer-events-none');
      setTimeout(() => box.classList.remove('scale-95'), 10);
    }

    function closeModal() {
      const container = $('modal-container');
      const box = $('modal-box');
      box.classList.add('scale-95');
      container.classList.add('opacity-0', 'pointer-events-none');
    }
    
    // GAS API CONFIG (JSON ONLY)
    const API_URL = "https://script.google.com/macros/s/AKfycbyFoJ2Tp7F4MOZ3lNyVDLTl45fVlV-hyAC1uYGL42oXkjBJ3ylST3KUYpaTb0lpK9FmSA/exec";

    async function callApi(action, params = {}) {
      let url = API_URL + "?action=" + action;
      for (let key in params) {
        url += "&" + key + "=" + encodeURIComponent(params[key]);
      }
      
      try {
        const response = await fetch(url, {
          method: 'GET',
          mode: 'cors',
          credentials: 'omit',
          redirect: 'follow'
        });
        
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }
        
        const data = await response.json();
        if (data.success === false) {
          throw new Error(data.message || "API Error");
        }
        return data;
      } catch (err) {
        console.error("API Connection Error:", err);
        alert("通信エラーが発生しました。\n内容: " + err.message);
        throw err;
      }
    }

    function startApp() {
      $('screen-gateway').classList.add('hidden');
      $('loading').classList.remove('hidden');
      loadData();
    }

    async function loadData() {
      try {
        const data = await callApi('getAppData');
        if (data && data.success) {
          areaSummary = data.areas;
          renderAreas();
          updateStats();
          
          const saved = localStorage.getItem('user_info');
          if (saved) {
            $('bottom-nav').classList.remove('hidden');
            switchPage('areas');
          } else {
            $('bottom-nav').classList.add('hidden');
            switchPage('settings');
          }
          
          $('app').classList.remove('hidden');
          setTimeout(() => {
            $('app').classList.remove('opacity-0');
            $('loading').classList.add('opacity-0');
            setTimeout(() => $('loading').classList.add('hidden'), 400);
          }, 100);
        } else {
          throw new Error(data ? data.message : "データが空です");
        }
      } catch (err) {
        console.error("Startup Error:", err);
        $('loading').classList.add('hidden');
        showModal("通信エラー", "理由: " + err.message);
      }
    }

    function renderAreas() {
      if (!areaSummary || areaSummary.length === 0) {
        $('area-list').innerHTML = '<p class="text-center text-gray-500 py-20 font-bold">データがありません。<br>一括作成を実行してください。</p>';
        return;
      }

      // 業務に関係ないカードを徹底除外（説明文やガイドを排除）
      $('area-list').innerHTML = areaSummary
        .filter(s => {
          const n = String(s.name || "");
          // 以下のいずれかに該当すれば除外:
          // 1. キーワードが含まれる
          // 2. 文字数が20文字以上（地区名としては長すぎる＝説明文と判断）
          const isGuide = n.includes('ガイド') || n.includes('名簿') || n.includes('使い方') || 
                          n.includes('三重第2区') || n.includes('活動') || n.includes('手順');
          return n && !isGuide && n.length < 20;
        })
        .map(s => `
        <div style="background: #0b0b0b; border-radius: 32px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(37,99,235,0.06);" 
             class="clickable-card p-8 flex items-center" onclick="openDetail('${s.name}')">
          <div class="w-3 h-3 rounded-full mr-6 ${s.progress >= 100 ? 'bg-[#22c55e] shadow-[0_0_15px_#22c55e]' : 'bg-[#e11d48] animate-pulse'}"></div>
          <div class="flex-1">
            <div class="text-lg font-black text-white tracking-tighter">${s.name}</div>
            <div class="text-[9px] font-bold text-gray-500 mt-1 uppercase tracking-widest">${s.progress}% Completed</div>
          </div>
          <span class="text-gray-600 text-xl font-light">›</span>
        </div>`).join('');
    }

    async function openDetail(name) {
      $('loading').classList.remove('hidden');
      $('loading').classList.remove('opacity-0');
      
      try {
        const data = await callApi('getAreaDetails', { name: name });
        if (data && data.points) {
          $('detail-title').textContent = name;
          $('detail-list').innerHTML = data.points.map((p, i) => `
            <div class="neu-flat rounded-[2rem] p-8 space-y-6">
              <div class="flex justify-between items-start gap-4">
                <div class="text-lg font-black text-navy dark:text-white tracking-tight leading-tight">${p.address}</div>
                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.address)}" target="_blank" class="w-14 h-14 neu-flat rounded-2xl flex items-center justify-center text-xl">📍</a>
              </div>
              <div class="flex flex-col gap-6">
                <label class="neu-inset rounded-3xl p-5 flex items-center gap-5 cursor-pointer active:scale-[0.98] transition-all">
                  <input type="checkbox" class="w-8 h-8 rounded-xl accent-navy" ${p.isDone?'checked':''} onchange="updateRecord('${name}',${p.rowId},'done',this.checked)">
                  <span class="text-[10px] font-black uppercase tracking-widest text-navy dark:text-white">${p.isDone?'MISSION COMPLETED':'READY TO DEPLOY'}</span>
                </label>
              </div>
            </div>`).join('');
          switchPage('detail');
        }
      } catch (e) {
        alert("詳細データの取得に失敗しました。");
      }
      
      $('loading').classList.add('opacity-0');
      setTimeout(() => $('loading').classList.add('hidden'), 700);
    }

    async function updateRecord(areaName, rowId, field, val) {
      const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
      const staffName = `${userInfo.last || ''} ${userInfo.first || ''}`.trim();
      
      try {
        const result = await callApi('submitDistribution', {
          areaName: areaName,
          rowId: rowId,
          staffName: staffName,
          isDone: val,
          action: 'submitDistribution'
        });
        if (result.success) {
          loadData();
        }
      } catch (e) {
        alert("更新に失敗しました。");
      }
    }

    function switchPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      if (id === 'settings') renderSettings();
      const target = $(id === 'detail' ? 'page-detail' : (id === 'settings' ? 'page-settings' : 'page-areas'));
      if(target) target.classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach((b, i) => { b.style.opacity = (id === 'areas' && i === 0) || (id === 'settings' && i === 1) ? '1' : '0.3'; });
      $('content').scrollTo(0,0);
    }

    function renderSettings() {
      const userInfo = JSON.parse(localStorage.getItem('user_info'));
      const container = $('settings-content');
      
      if (!userInfo) {
        // Card 1: Registration (Absolute alignment with Splash Model)
        $('bottom-nav').classList.add('hidden');
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center py-10 px-4">
            <div class="mb-16 text-center">
              <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">
                <span class="font-black">お名前を登録して</span><br>
                <span class="font-medium">ください</span>
              </p>
            </div>
            <div class="w-full space-y-14 text-left">
              <div>
                <label style="color: rgba(255,255,255,0.72);" class="text-[11px] font-black uppercase tracking-[0.2em] mb-4 block text-center">苗字</label>
                <input type="text" id="user-last" class="w-full bg-white rounded-2xl py-6 px-7 text-lg font-black text-black text-left outline-none shadow-xl" placeholder="例：鈴木">
              </div>
              <div>
                <label style="color: rgba(255,255,255,0.72);" class="text-[11px] font-black uppercase tracking-[0.2em] mb-4 block text-center">名前</label>
                <input type="text" id="user-first" class="w-full bg-white rounded-2xl py-6 px-7 text-lg font-black text-black text-left outline-none shadow-xl" placeholder="例：一郎">
              </div>
              
              <!-- 二重構造のボタンフレーム: 入力欄と横幅を統一 -->
              <div class="bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
                <button onclick="saveProfile()" class="btn-neu w-full bg-[#2563eb] text-white rounded-2xl py-6 text-lg font-black shadow-xl transition-all">登録を完了する</button>
              </div>
            </div>
          </div>
        `;
      } else {
        // Card 2: Distributor ID Card (Standardized to Splash Model)
        $('bottom-nav').classList.remove('hidden');
        container.innerHTML = `
          <div class="py-10 px-4 flex flex-col items-center">
            <div class="mb-16 text-center">
              <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">
                <span class="font-black">配布員証</span><br>
                <span class="font-medium">公式配布員 IDカード</span>
              </p>
            </div>
            
            <div style="background: #0b0b0b; border-radius: 32px; border: 1px solid rgba(255,255,255,0.08);" class="w-full p-12 text-center">
              <div class="inline-flex items-center gap-3 mb-10">
                <span class="w-3 h-3 bg-[#22c55e] rounded-full shadow-[0_0_8px_#22c55e]"></span>
                <span class="text-[11px] font-black text-[#22c55e] uppercase tracking-[0.3em]">Authorized Staff</span>
              </div>
              
              <h3 class="text-4xl font-black text-white tracking-tighter mb-4">${userInfo.last} ${userInfo.first} <span class="text-lg text-gray-500 font-medium">様</span></h3>
              <p class="text-[11px] font-black text-gray-500 uppercase tracking-[0.3em] mt-8">Field Operations</p>
            </div>
            
            <div class="w-full mt-20 space-y-6">
              <button onclick="switchPage('areas')" class="btn-neu w-full bg-[#2563eb] text-white rounded-[1.8rem] py-7 text-xl font-black shadow-xl">業務を開始する</button>
              <button onclick="logout()" class="w-full text-[11px] font-black text-rose-500 uppercase tracking-[0.4em] py-4 active:opacity-50 transition-all">Logout / Unregister</button>
            </div>
          </div>
        `;
      }
    }

    function logout() {
      if(confirm('登録を解除してもよろしいですか？')) {
        localStorage.removeItem('user_info');
        $('bottom-nav').classList.add('hidden');
        renderSettings();
      }
    }

    function updateStats() {
      const total = areaSummary.length;
      if (total === 0) {
        $('header-pct').textContent = '0%';
        return;
      }
      const avg = areaSummary.reduce((acc, cur) => acc + (cur.progress || 0), 0) / total;
      $('header-pct').textContent = Math.round(avg) + '%';
    }


    function saveProfile() {
      const last = $('user-last').value.trim();
      const first = $('user-first').value.trim();
      if (!last || !first) { 
        showModal("姓名を入力して<br>ください", "名前は必須項目です");
        return; 
      }
      
      const info = { last, first, registeredAt: new Date().toISOString() };
      localStorage.setItem('user_info', JSON.stringify(info));
      loadData();
    }

    window.onload = () => {
      const saved = localStorage.getItem('user_info');
      if (saved) {
        // 登録済みならスプラッシュを即座に隠して起動
        $('screen-gateway').classList.add('hidden');
        loadData();
      } else {
        console.log("POSTING MAP PRO: Initial splash mode.");
      }
    };
  </script>
</body>
</html>
