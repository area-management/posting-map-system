<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POSTING MAP NEXT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            navy: {
              DEFAULT: '#1a237e',
              light: '#283593',
              dark: '#0d1642'
            },
            apple: {
              light: '#f5f5f7',
              dark: '#000000'
            }
          },
          fontFamily: {
            sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
          },
          boxShadow: {
            'neu-light': '8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff',
            'neu-dark': '8px 8px 16px #000000, -4px -4px 12px #1c1c1e',
            'neu-inset-light': 'inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff',
            'neu-inset-dark': 'inset 4px 4px 8px #000000, inset -2px -2px 6px #1c1c1e',
          }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Neumorphic Hover */
    .btn-neu { transition: all 0.3s ease; }
    .btn-neu:active { transform: scale(0.96); box-shadow: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff; }
    @media (prefers-color-scheme: dark) {
      .btn-neu:active { box-shadow: inset 4px 4px 8px #000000, inset -2px -2px 6px #1c1c1e; }
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
  </style>
</head>
<body class="bg-apple-light dark:bg-apple-dark text-[#1d1d1f] dark:text-[#f5f5f7] font-sans antialiased overflow-hidden select-none transition-colors duration-500">

  <!-- Gateway / Splash -->
  <div id="screen-gateway" class="fixed inset-0 z-[1000] bg-apple-light dark:bg-apple-dark flex flex-col items-center justify-start pt-24 px-10 text-center safe-top safe-bottom overflow-hidden">
    <!-- Main Branding (Lifted up) -->
    <div class="flex flex-col items-center justify-center animate-fade-in mb-16">
      <div class="w-32 h-32 bg-apple-light dark:bg-[#1c1c1e] rounded-[3rem] shadow-neu-light dark:shadow-neu-dark flex items-center justify-center overflow-hidden mb-12 p-1">
        <img src="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=73" class="w-full h-full object-cover rounded-[2.8rem]">
      </div>
      <p class="text-gray-500 dark:text-gray-400 font-bold leading-relaxed text-sm">
        ホーム画面へ追加してから<br>アプリをご利用ください
      </p>
    </div>
    
    <!-- Action Area (Lifted even more) -->
    <div class="w-full max-w-sm space-y-10 animate-fade-in" style="animation-delay: 0.2s;">
      <div class="bg-white/40 dark:bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-8 shadow-neu-light dark:shadow-neu-dark border border-white/20">
        <button onclick="forceStart()" class="btn-neu w-full bg-navy dark:bg-blue-600 text-white rounded-2xl py-5 text-xl font-black shadow-xl active:scale-[0.98]">
          アプリを起動する
        </button>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-[0.3em]">Posting Management System</p>
    </div>
  </div>
      <p class="text-[9px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-widest">Designed for Professional Operations</p>
    </div>
  </div>

  <!-- Main Shell (Hybrid Glass & Neu) -->
  <div id="app-shell" class="hidden flex flex-col h-screen">
    <header class="bg-apple-light/70 dark:bg-apple-dark/70 backdrop-blur-3xl border-b border-white/20 safe-top z-[100]">
      <div class="px-8 py-6 flex justify-between items-center h-20 md:h-24">
        <div class="flex flex-col">
          <div class="text-2xl font-black tracking-tighter leading-none flex items-center gap-2">
            <span class="text-navy dark:text-blue-400">NEXT</span>
            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
            <span class="text-gray-300 dark:text-gray-600">COMMAND</span>
          </div>
          <div id="view-title-text" class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mt-2">Initializing System</div>
        </div>
        <div id="header-sync" class="flex items-center gap-3 bg-white/50 dark:bg-white/5 px-4 py-2 rounded-full shadow-neu-inset-light dark:shadow-neu-inset-dark">
          <span class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_12px_#22c55e]"></span>
          <span id="sync-pct" class="text-xs font-black text-navy dark:text-green-400 tracking-tighter">0%</span>
        </div>
      </div>
    </header>

    <main id="view-content" class="flex-1 overflow-y-auto hide-scrollbar p-8 space-y-8 safe-bottom pb-40">
      <!-- Dynamic Content -->
    </main>

    <!-- Navigation (Floating Glass Neu) -->
    <nav class="fixed bottom-10 left-10 right-10 bg-white/60 dark:bg-white/5 backdrop-blur-3xl rounded-[3rem] shadow-neu-light dark:shadow-neu-dark border border-white/20 flex justify-around items-center p-3 z-[200]">
      <button id="nav-howto" onclick="switchTab('howto')" class="flex flex-col items-center justify-center w-20 py-3 transition-all nav-item active group">
        <span class="text-3xl mb-1 transition-all group-active:scale-90 group-[.active]:drop-shadow-[0_0_8px_rgba(26,35,126,0.3)]">📋</span>
        <span class="text-[9px] font-black uppercase tracking-widest group-[.active]:text-navy dark:group-[.active]:text-blue-400 opacity-40 group-[.active]:opacity-100">Guide</span>
      </button>
      <button id="nav-area" onclick="switchTab('area')" class="flex flex-col items-center justify-center w-20 py-3 transition-all nav-item group">
        <span class="text-3xl mb-1 transition-all group-active:scale-90 group-[.active]:drop-shadow-[0_0_8px_rgba(26,35,126,0.3)]">📍</span>
        <span class="text-[9px] font-black uppercase tracking-widest group-[.active]:text-navy dark:group-[.active]:text-blue-400 opacity-40 group-[.active]:opacity-100">Areas</span>
      </button>
      <button id="nav-settings" onclick="switchTab('settings')" class="flex flex-col items-center justify-center w-20 py-3 transition-all nav-item group">
        <span class="text-3xl mb-1 transition-all group-active:scale-90 group-[.active]:drop-shadow-[0_0_8_rgba(26,35,126,0.3)]">⚙️</span>
        <span class="text-[9px] font-black uppercase tracking-widest group-[.active]:text-navy dark:group-[.active]:text-blue-400 opacity-40 group-[.active]:opacity-100">Auth</span>
      </button>
    </nav>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyi8U3f3nQ2j0zS7B5x9vW1pZf9s9m_q9z/exec"; // Dummy, will be updated by GAS

    function forceStart() {
      document.getElementById('screen-gateway').classList.add('hidden');
      document.getElementById('app-shell').classList.remove('hidden');
      switchTab('settings');
    }

    function switchTab(tabId) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + tabId).classList.add('active');
      
      const content = document.getElementById('view-content');
      content.innerHTML = '<div class="flex flex-col items-center justify-center py-20 opacity-20"><div class="w-10 h-10 border-4 border-navy border-t-transparent rounded-full animate-spin"></div></div>';
      
      // Simulate loading for now, real logic would inject HTML templates
      setTimeout(() => renderTab(tabId), 300);
    }

    function renderTab(tabId) {
      const content = document.getElementById('view-content');
      if (tabId === 'settings') {
        content.innerHTML = `
          <div class="animate-fade-in">
            <div class="bg-white/60 dark:bg-white/5 rounded-[2.5rem] p-10 shadow-neu-light dark:shadow-neu-dark mb-10 border border-white/20">
              <h2 class="text-2xl font-black text-navy dark:text-blue-400 tracking-tight mb-8">お名前を登録してください</h2>
              <div class="space-y-8">
                <div>
                  <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">苗字 (全角)</label>
                  <input type="text" placeholder="例：鈴木" class="w-full bg-apple-light/50 dark:bg-black/20 rounded-2xl p-5 text-lg font-bold shadow-neu-inset-light dark:shadow-neu-inset-dark border-none outline-none focus:ring-2 ring-navy/10 transition-all">
                </div>
                <div>
                  <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">名前 (全角)</label>
                  <input type="text" placeholder="例：一郎" class="w-full bg-apple-light/50 dark:bg-black/20 rounded-2xl p-5 text-lg font-bold shadow-neu-inset-light dark:shadow-neu-inset-dark border-none outline-none focus:ring-2 ring-navy/10 transition-all">
                </div>
                <button class="btn-neu w-full bg-navy dark:bg-blue-600 text-white rounded-2xl py-5 text-lg font-black shadow-xl">登録を完了する</button>
              </div>
            </div>
          </div>
        `;
      }
    }
    
    window.onload = () => {
      // In standalone (PWA) mode, we might skip splash
      if (window.navigator.standalone) {
        // forceStart();
      }
      document.getElementById('screen-gateway').classList.remove('hidden');
    };
  </script>
</body>
</html>
